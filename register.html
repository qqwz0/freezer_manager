<!DOCTYPE html>
 <html lang="en">
 <head>
     <meta charset="UTF-8">
     <meta http-equiv="X-UA-Compatible" content="IE=edge">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Реєстрація</title>
 
     <!--Stylesheet-->
     <link rel="stylesheet" href="css/register.css">
 </head>
 <body>
     <div class="registration-container">
         <div class="registration-header">
             <h2>Реєстрація</h2>
             <span class="divider"></span>
         </div>
         <div class="registration-body">
             <form id="register-form">
                 <div class="registration-box">
                     <div class="input-box">
                         <label for="name">Ім'я</label>
                         <input type="text" id="name" class="input-field" placeholder="Введіть своє ім'я" required>
                     </div>
                     <div class="input-box">
                         <label for="email">Пошта</label>
                         <input type="email" id="email" class="input-field" placeholder="Введіть свою електронну адресу" required>
                     </div>
                     <div class="input-box">
                         <label for="password">Пароль</label>
                         <input type="password" id="password" class="input-field" placeholder="Введіть свій пароль" required>
                     </div>
                 </div>
                 <button type="submit" class="btn-register">Зареєструватися</button>
             </form>
         </div>
         <div class="registration-footer">
             <h3>Вже маєш обліковий запис? <a href="index.html"> Увійди!</a></h3>
         </div>
     </div>

     <script type="module" src="js/register.js"></script>
 </body>
 </html>
